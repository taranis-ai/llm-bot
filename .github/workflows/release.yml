name: Release

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build Release Assets
    runs-on: ubuntu-latest

    env:
      GHCR_IMAGE: ghcr.io/taranis-ai/taranis-${{ github.event.repository.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive release metadata
        shell: bash
        run: |
          echo "TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"
          echo "TAG_SAFE=${GITHUB_REF#refs/tags/}" | tr '.' '_' | awk '{print "TAG_SAFE="$0}' >> "$GITHUB_ENV"

      - name: Validate tag matches package version scheme
        shell: bash
        run: |
          if [[ ! "${TAG}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '${TAG}' does not match the expected X.Y.Z format."
            exit 1
          fi

      - name: Prepare release notes from annotated tag
        shell: bash
        run: |
          git tag -l --format='%(contents)' "${TAG}" > "${RUNNER_TEMP}/release_body.md"
          if [[ -s "${RUNNER_TEMP}/release_body.md" ]]; then
            {
              echo "### ${TAG}"
              cat "${RUNNER_TEMP}/release_body.md"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ${TAG}" >> "$GITHUB_STEP_SUMMARY"
            echo "No annotated tag message found." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Build Python distributions
        run: uv build

      - name: Generate SBOM
        shell: bash
        run: |
          uv export --format cyclonedx1.5 > "${RUNNER_TEMP}/sbom_${TAG_SAFE}.json"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag published container image
        shell: bash
        run: |
          docker buildx imagetools create \
            --tag "${GHCR_IMAGE}:${TAG}" \
            --tag "${GHCR_IMAGE}:stable" \
            "${GHCR_IMAGE}:latest"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          append_body: true
          body_path: ${{ runner.temp }}/release_body.md
          files: |
            dist/*
            openapi3_1.yml
            Containerfile
            ${{ runner.temp }}/sbom_${{ env.TAG_SAFE }}.json
