openapi: 3.1.0
info:
  title: LLM Bot for Taranis AI
  description: |
    Multi-route LLM-backed bot service for Taranis AI.

    The current implementation exposes sentiment analysis, title generation, translation,
    summarization, clustering, named entity recognition, and entity linking routes backed by
    an OpenAI-compatible Responses API.

    Canonical paths are documented without a trailing slash. The service
    accepts both forms.
  version: 0.0.0
  license:
    name: EUPL-1.2
    url: https://joinup.ec.europa.eu/collection/eupl/eupl-text-eupl-12

servers:
  - url: http://localhost:5500
    description: Local development server
  - url: http://localhost:8000
    description: Container server

paths:
  /sentiment:
    post:
      summary: Analyze sentiment for input text
      description: |
        Accepts input text and returns a high-level sentiment label with a
        confidence score.

        When `include_emotions` is true, the response also includes zero or
        more Plutchik emotions that are compatible with the predicted
        sentiment.

        This endpoint can be protected with a Bearer token using the `API_KEY`
        environment variable.
      operationId: analyzeSentiment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SentimentRequest"
            examples:
              basic:
                summary: Example sentiment request
                value:
                  text: "The launch was a success."
              withEmotions:
                summary: Example sentiment request with emotions
                value:
                  text: "The breach left customers angry and alarmed."
                  include_emotions: true
                  thinking_budget_tokens: 256
      responses:
        "200":
          description: Sentiment analyzed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SentimentResponse"
        "400":
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Invalid sentiment request payload"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Unauthorized"
        "502":
          description: Upstream LLM or parsing failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Failed to analyze sentiment"


  /title:
    post:
      summary: Generate a concise story title from input text
      description: |
        Accepts input text and returns a concise title in the same language.

        The model is instructed to stay within the request `max_chars` field, which defaults to 100 when omitted. The service does not truncate longer model outputs.

        This endpoint can be protected with a Bearer token using the `API_KEY`
        environment variable.
      operationId: generateTitle
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TitleRequest"
            examples:
              basic:
                summary: Example title request
                value:
                  text: "Apple announced new Mac hardware during its developer event in Cupertino."
                  max_chars: 100
                  thinking_budget_tokens: 256
      responses:
        "200":
          description: Title generated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TitleResponse"
        "400":
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Invalid title request payload"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Unauthorized"
        "502":
          description: Upstream LLM or parsing failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Failed to generate title"

  /translate:
    post:
      summary: Translate input text into a target language
      description: |
        Accepts plain text and returns a faithful translation into the requested
        target language.

        When `source_language` is omitted, the model is instructed to detect
        the source language from the input text.

        This endpoint can be protected with a Bearer token using the `API_KEY`
        environment variable.
      operationId: translateText
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TranslateRequest"
            examples:
              explicitSource:
                summary: Example translation request with explicit source language
                value:
                  text: "Guten Morgen"
                  source_language: "de"
                  target_language: "en"
                  thinking_budget_tokens: 256
              autodetectSource:
                summary: Example translation request with automatic source detection
                value:
                  text: "Bonjour"
                  target_language: "en"
      responses:
        "200":
          description: Translation generated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranslateResponse"
        "400":
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Invalid translate request payload"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Unauthorized"
        "502":
          description: Upstream LLM or parsing failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Failed to translate text"

  /summarize:
    post:
      summary: Summarize input stories
      description: |
        Accepts story news items and returns a summarized version.

        This endpoint can be protected with a Bearer token using the `API_KEY`
        environment variable.
      operationId: summarizeText
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SummarizeRequest"
            examples:
              basic:
                summary: Example summarize request
                value:
                  news_items:
                    - title: "Story title"
                      content: "This is the input text to summarize."
                  max_words: 80
                  thinking_budget_tokens: 256
      responses:
        "200":
          description: Summary generated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SummarizeResponse"
        "400":
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Invalid summarize request payload"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Unauthorized"
        "502":
          description: Upstream LLM or parsing failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Failed to generate summary"

  /ner:
    post:
      summary: Extract named entities from input text
      description: |
        Accepts input text and extracts named entities.

        When `cybersecurity` is enabled, the extraction includes
        cybersecurity-relevant entities in addition to general named entities.

        This endpoint performs extraction only. It does not run entity linking.

        This endpoint can be protected with a Bearer token using the `API_KEY`
        environment variable.
      operationId: extractEntities
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NerRequest"
            examples:
              basic:
                summary: Example NER request
                value:
                  text: "Microsoft announced that Outlook users in Vienna should install updates immediately."
                  cybersecurity: false
              cybersecurity:
                summary: Example cybersecurity-aware NER request
                value:
                  text: "APT29 used Mimikatz and PowerShell to dump credentials from government systems."
                  cybersecurity: true
                  thinking_budget_tokens: 256
      responses:
        "200":
          description: Entities extracted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NerResponse"
        "400":
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Invalid NER request payload"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Unauthorized"
        "502":
          description: Upstream LLM or parsing failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Failed to extract entities"

  /ner-link:
    post:
      summary: Extract and link named entities from input text
      description: |
        Accepts input text, extracts named entities, and resolves them against
        the configured lookup service.

        This endpoint combines NER and linking in one call and returns the
        structured linked-entity response.

        This endpoint can be protected with a Bearer token using the `API_KEY`
        environment variable.
      operationId: extractAndLinkEntities
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NerLinkRequest"
            examples:
              deterministic:
                summary: Example deterministic NER and linking request
                value:
                  text: "Apple announced new Mac hardware during its developer event in Cupertino."
                  max_chars: 100
                  language: "en"
                  linking_mode: "deterministic"
              llm:
                summary: Example LLM NER and linking request
                value:
                  text: "Apple announced new Mac hardware during its developer event in Cupertino."
                  max_chars: 100
                  language: "en"
                  linking_mode: "llm"
                  thinking_budget_tokens: 256
      responses:
        "200":
          description: Entities extracted and linked successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkedNerResponse"
        "400":
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Invalid NER link request payload"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Unauthorized"
        "502":
          description: Upstream NER, lookup, or disambiguation failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Failed to extract and link entities"

  /link:
    post:
      summary: Link known entities to Wikidata candidates
      description: |
        Accepts source text plus a list of known entities and resolves them
        against the configured lookup service.

        This endpoint performs linking only. It does not run NER first.

        This endpoint can be protected with a Bearer token using the `API_KEY`
        environment variable.
      operationId: linkEntities
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkRequest"
            examples:
              deterministic:
                summary: Example deterministic linking request
                value:
                  text: "Apple announced new Mac hardware during its developer event in Cupertino."
                  max_chars: 100
                  language: "en"
                  linking_mode: "deterministic"
                  entities:
                    - mention: "Apple"
                      type: "ORG"
                    - mention: "Cupertino"
                      type: "GPE"
                    - mention: "Mac"
                      type: "PRODUCT"
              llm:
                summary: Example LLM linking request
                value:
                  text: "Apple announced new Mac hardware during its developer event in Cupertino."
                  max_chars: 100
                  language: "en"
                  linking_mode: "llm"
                  thinking_budget_tokens: 256
                  entities:
                    - mention: "Apple"
                      type: "ORG"
                    - mention: "Cupertino"
                      type: "GPE"
                    - mention: "Mac"
                      type: "PRODUCT"
      responses:
        "200":
          description: Entities linked successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkedNerResponse"
        "400":
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Invalid link request payload"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Unauthorized"
        "502":
          description: Lookup or disambiguation failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Failed to link entities"

  /cluster:
    post:
      summary: Cluster stories into event groups
      description: |
        Accepts a batch of stories and returns event clusters in the shape
        expected by the existing Taranis story bot integration.

        This endpoint can be protected with a Bearer token using the `API_KEY`
        environment variable.
      operationId: clusterStories
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClusterRequest"
            examples:
              basic:
                summary: Example clustering request
                value:
                  stories:
                    - id: "s1"
                      tags:
                        APT29:
                          tag_type: "APT"
                      news_items:
                        - title: "APT29 targets Microsoft users"
                          content: "APT29 targeted Microsoft users in Vienna."
                          language: "en"
                    - id: "s2"
                      tags:
                        Microsoft:
                          tag_type: "Organization"
                      news_items:
                        - title: "Microsoft users targeted in Vienna"
                          content: "Users in Vienna were targeted in an APT29 campaign."
                          language: "en"
                  thinking_budget_tokens: 256
      responses:
        "200":
          description: Stories clustered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClusterResponse"
        "400":
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Invalid cluster request payload"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Unauthorized"
        "502":
          description: Upstream LLM or parsing failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Failed to cluster stories"

  /health:
    get:
      summary: Health check endpoint
      operationId: healthCheck
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - status
                properties:
                  status:
                    type: string
                    example: ok

  /info:
    get:
      summary: Runtime information
      operationId: serviceInfo
      responses:
        "200":
          description: Discoverable service information and active non-secret config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InfoResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key
  schemas:
    ThinkingBudgetTokens:
      type: integer
      minimum: 0
      nullable: true
      description: |
        Optional provider-specific reasoning budget forwarded upstream unchanged
        as `thinking_budget_tokens`. This is intended for compatible servers such
        as `llama.cpp`; other OpenAI-compatible servers may reject it.
    SentimentRequest:
      type: object
      additionalProperties: false
      required:
        - text
      properties:
        text:
          type: string
          minLength: 1
          description: Text to analyze for sentiment
        include_emotions:
          type: boolean
          default: false
          description: |
            When true, include zero or more Plutchik emotions in the response.
        thinking_budget_tokens:
          $ref: "#/components/schemas/ThinkingBudgetTokens"
    SentimentResult:
      type: object
      additionalProperties: false
      required:
        - label
        - score
      properties:
        label:
          type: string
          enum:
            - positive
            - negative
            - neutral
        score:
          type: number
          minimum: 0
          maximum: 1
        emotions:
          type: array
          nullable: true
          uniqueItems: true
          items:
            type: string
            enum:
              - anger
              - fear
              - sadness
              - disgust
              - surprise
              - anticipation
              - trust
              - joy
    SentimentResponse:
      type: object
      additionalProperties: false
      required:
        - sentiment
      properties:
        sentiment:
          $ref: "#/components/schemas/SentimentResult"
    InfoResponse:
      type: object
      additionalProperties: false
      required:
        - package_name
        - reasoning_profiles
        - linking_modes
        - endpoints
        - current
      properties:
        package_name:
          type: string
        reasoning_profiles:
          type: object
          additionalProperties:
            type: object
            additionalProperties: false
            required:
              - description
            properties:
              description:
                type: string
        linking_modes:
          type: array
          items:
            type: string
        endpoints:
          type: object
          additionalProperties:
            type: string
        current:
          type: object
          additionalProperties: true

    TitleRequest:
      type: object
      additionalProperties: false
      required:
        - text
      properties:
        text:
          type: string
          minLength: 1
          description: Text to convert into a concise story title
        max_chars:
          type: integer
          minimum: 1
          default: 100
          description: Maximum allowed length of the generated title
        thinking_budget_tokens:
          $ref: "#/components/schemas/ThinkingBudgetTokens"

    TitleResponse:
      type: object
      additionalProperties: false
      required:
        - title
      properties:
        title:
          type: string
          minLength: 1
          description: Generated title text. The model is instructed to stay within max_chars, but the service does not truncate longer outputs.

    TranslateRequest:
      type: object
      additionalProperties: false
      required:
        - text
        - target_language
      properties:
        text:
          type: string
          minLength: 1
          description: Text to translate
        target_language:
          type: string
          minLength: 1
          description: Target language code for the translation output
        source_language:
          type: string
          nullable: true
          minLength: 1
          description: Optional source language code. When omitted, the model is instructed to detect it.
        thinking_budget_tokens:
          $ref: "#/components/schemas/ThinkingBudgetTokens"

    TranslateResponse:
      type: object
      additionalProperties: false
      required:
        - translation
      properties:
        translation:
          type: string
          minLength: 1
          description: Faithful translated text in the requested target language

    SummarizeRequest:
      type: object
      additionalProperties: false
      required:
        - text
      properties:
        text:
          type: string
          minLength: 1
          description: Text to summarize
        max_words:
          type: integer
          minimum: 1
          description: Optional maximum number of words in the summary
        thinking_budget_tokens:
          $ref: "#/components/schemas/ThinkingBudgetTokens"
    SummarizeResponse:
      type: object
      additionalProperties: false
      required:
        - summary
      properties:
        summary:
          type: string
          minLength: 1
          description: Generated summary text
    NerRequest:
      type: object
      additionalProperties: false
      required:
        - text
      properties:
        text:
          type: string
          minLength: 1
          description: Text to analyze for named entities
        cybersecurity:
          type: boolean
          default: false
          description: |
            When true, include cybersecurity-relevant entities in addition to
            general named entities.
        entity_types:
          type: array
          items:
            type: string
        thinking_budget_tokens:
          $ref: "#/components/schemas/ThinkingBudgetTokens"
    NerLinkRequest:
      type: object
      additionalProperties: false
      required:
        - text
      properties:
        text:
          type: string
          minLength: 1
          description: Text to analyze and link
        cybersecurity:
          type: boolean
          default: false
        entity_types:
          type: array
          items:
            type: string
        language:
          type: string
          nullable: true
          description: Optional language code used for entity lookup.
        linking_mode:
          type: string
          nullable: true
          enum:
            - deterministic
            - llm
          description: |
            Candidate selection mode when linking is enabled.
        thinking_budget_tokens:
          $ref: "#/components/schemas/ThinkingBudgetTokens"
    NerResponse:
      type: object
      description: Flat map of entity values to entity types
      additionalProperties:
        type: string
    LinkedEntity:
      type: object
      additionalProperties: false
      required:
        - mention
        - type
      properties:
        mention:
          type: string
          minLength: 1
        type:
          type: string
          minLength: 1
        wikidata_qid:
          type: string
          nullable: true
        wikidata_label:
          type: string
          nullable: true
        wikidata_description:
          type: string
          nullable: true
        matched_alias:
          type: string
          nullable: true
        match_type:
          type: string
          nullable: true
        score:
          type: number
          nullable: true
        candidate_count:
          type: integer
          minimum: 0
          nullable: true
    LinkedNerResponse:
      type: object
      additionalProperties: false
      required:
        - entities
      properties:
        entities:
          type: array
          items:
            $ref: "#/components/schemas/LinkedEntity"
    LinkRequestEntity:
      type: object
      additionalProperties: false
      required:
        - mention
        - type
      properties:
        mention:
          type: string
          minLength: 1
        type:
          type: string
          minLength: 1
    LinkRequest:
      type: object
      additionalProperties: false
      required:
        - text
        - entities
      properties:
        text:
          type: string
          minLength: 1
        language:
          type: string
          nullable: true
        linking_mode:
          type: string
          nullable: true
          enum:
            - deterministic
            - llm
        thinking_budget_tokens:
          $ref: "#/components/schemas/ThinkingBudgetTokens"
        entities:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/LinkRequestEntity"
    StoryTag:
      type: object
      required:
        - tag_type
      properties:
        tag_type:
          type: string
      additionalProperties: true
    StoryNewsItem:
      type: object
      additionalProperties: true
      required:
        - title
        - content
        - language
      properties:
        title:
          type: string
        content:
          type: string
        review:
          type: string
          nullable: true
        language:
          type: string
    StoryClusterItem:
      type: object
      additionalProperties: true
      required:
        - id
        - tags
        - news_items
      properties:
        id:
          type: string
          minLength: 1
        tags:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/StoryTag"
        news_items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/StoryNewsItem"
    ClusterRequest:
      type: object
      additionalProperties: false
      required:
        - stories
      properties:
        stories:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/StoryClusterItem"
        thinking_budget_tokens:
          $ref: "#/components/schemas/ThinkingBudgetTokens"
    ClusterIds:
      type: object
      additionalProperties: false
      required:
        - event_clusters
      properties:
        event_clusters:
          type: array
          minItems: 1
          items:
            type: array
            items:
              type: string
    ClusterResponse:
      type: object
      additionalProperties: false
      required:
        - cluster_ids
        - message
      properties:
        cluster_ids:
          $ref: "#/components/schemas/ClusterIds"
        message:
          type: string
          minLength: 1
    Error:
      type: object
      additionalProperties: false
      required:
        - error
      properties:
        error:
          type: string

tags:
  - name: Summarization
    description: Summarization operations
  - name: NER
    description: Named entity recognition operations
  - name: Clustering
    description: Story clustering operations
  - name: System
    description: Health and info endpoints
