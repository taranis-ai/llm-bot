openapi: 3.1.0
info:
  title: LLM Bot for Taranis AI
  description: |
    Multi-route LLM-backed bot service for Taranis AI.

    The current implementation exposes summarization, clustering, and named entity
    recognition routes backed by an OpenAI-compatible Responses API.

    Canonical paths are documented without a trailing slash. The service
    accepts both forms.
  version: 0.0.0
  license:
    name: EUPL-1.2
    url: https://joinup.ec.europa.eu/collection/eupl/eupl-text-eupl-12

servers:
  - url: http://localhost:5500
    description: Local development server
  - url: http://localhost:8000
    description: Container server

paths:
  /summarize:
    post:
      summary: Summarize input text
      description: |
        Accepts input text and returns a summarized version.

        This endpoint can be protected with a Bearer token using the `API_KEY`
        environment variable.
      operationId: summarizeText
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SummarizeRequest"
            examples:
              basic:
                summary: Example summarize request
                value:
                  text: "This is the input text to summarize."
                  max_words: 80
      responses:
        "200":
          description: Summary generated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SummarizeResponse"
        "400":
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Invalid summarize request payload"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Unauthorized"
        "502":
          description: Upstream LLM or parsing failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Failed to generate summary"

  /ner:
    post:
      summary: Extract named entities from input text
      description: |
        Accepts input text and extracts named entities.

        When `cybersecurity` is enabled, the extraction includes
        cybersecurity-relevant entities in addition to general named entities.

        When linking is disabled, the response is a flat JSON object that maps
        entity values to entity types.

        When linking is enabled, the response is a structured list of linked
        entities with optional Wikidata fields.

        This endpoint can be protected with a Bearer token using the `API_KEY`
        environment variable.
      operationId: extractEntities
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NerRequest"
            examples:
              basic:
                summary: Example NER request
                value:
                  text: "Microsoft announced that Outlook users in Vienna should install updates immediately."
                  cybersecurity: false
                  link_entities: false
              cybersecurity:
                summary: Example cybersecurity-aware NER request
                value:
                  text: "APT29 used Mimikatz and PowerShell to dump credentials from government systems."
                  cybersecurity: true
                  link_entities: false
              deterministicLinking:
                summary: Example deterministic linking request
                value:
                  text: "Apple released a new device."
                  link_entities: true
                  language: "en"
                  linking_mode: "deterministic"
              llmLinking:
                summary: Example LLM linking request
                value:
                  text: "Apple released a new device."
                  link_entities: true
                  language: "en"
                  linking_mode: "llm"
      responses:
        "200":
          description: Entities extracted successfully
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/NerResponse"
                  - $ref: "#/components/schemas/LinkedNerResponse"
        "400":
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Invalid NER request payload"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Unauthorized"
        "502":
          description: Upstream LLM or parsing failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Failed to extract entities"

  /cluster:
    post:
      summary: Cluster stories into event groups
      description: |
        Accepts a batch of stories and returns event clusters in the shape
        expected by the existing Taranis story bot integration.

        This endpoint can be protected with a Bearer token using the `API_KEY`
        environment variable.
      operationId: clusterStories
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClusterRequest"
            examples:
              basic:
                summary: Example clustering request
                value:
                  stories:
                    - id: "s1"
                      tags:
                        APT29:
                          tag_type: "APT"
                      news_items:
                        - title: "APT29 targets Microsoft users"
                          content: "APT29 targeted Microsoft users in Vienna."
                          language: "en"
                    - id: "s2"
                      tags:
                        Microsoft:
                          tag_type: "Organization"
                      news_items:
                        - title: "Microsoft users targeted in Vienna"
                          content: "Users in Vienna were targeted in an APT29 campaign."
                          language: "en"
      responses:
        "200":
          description: Stories clustered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClusterResponse"
        "400":
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Invalid cluster request payload"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Unauthorized"
        "502":
          description: Upstream LLM or parsing failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Failed to cluster stories"

  /health:
    get:
      summary: Health check endpoint
      operationId: healthCheck
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - status
                properties:
                  status:
                    type: string
                    example: ok

  /info:
    get:
      summary: Runtime information
      operationId: serviceInfo
      responses:
        "200":
          description: Service configuration overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InfoResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key
  schemas:
    SummarizeRequest:
      type: object
      additionalProperties: false
      required:
        - text
      properties:
        text:
          type: string
          minLength: 1
          description: Text to summarize
        max_words:
          type: integer
          minimum: 1
          description: Optional maximum number of words in the summary
    SummarizeResponse:
      type: object
      additionalProperties: false
      required:
        - summary
      properties:
        summary:
          type: string
          minLength: 1
          description: Generated summary text
    NerRequest:
      type: object
      additionalProperties: false
      required:
        - text
      properties:
        text:
          type: string
          minLength: 1
          description: Text to analyze for named entities
        cybersecurity:
          type: boolean
          default: false
          description: |
            When true, include cybersecurity-relevant entities in addition to
            general named entities.
        entity_types:
          type: array
          items:
            type: string
        link_entities:
          type: boolean
          nullable: true
          description: |
            When true, resolve extracted entities against the configured lookup
            service and return linked entities.
        language:
          type: string
          nullable: true
          description: Optional language code used for entity lookup.
        linking_mode:
          type: string
          nullable: true
          enum:
            - deterministic
            - llm
          description: |
            Candidate selection mode when linking is enabled.
    NerResponse:
      type: object
      description: Flat map of entity values to entity types
      additionalProperties:
        type: string
    LinkedEntity:
      type: object
      additionalProperties: false
      required:
        - mention
        - type
      properties:
        mention:
          type: string
          minLength: 1
        type:
          type: string
          minLength: 1
        wikidata_qid:
          type: string
          nullable: true
        wikidata_label:
          type: string
          nullable: true
        wikidata_description:
          type: string
          nullable: true
        matched_alias:
          type: string
          nullable: true
        match_type:
          type: string
          nullable: true
        score:
          type: number
          nullable: true
        candidate_count:
          type: integer
          minimum: 0
          nullable: true
    LinkedNerResponse:
      type: object
      additionalProperties: false
      required:
        - entities
      properties:
        entities:
          type: array
          items:
            $ref: "#/components/schemas/LinkedEntity"
    StoryTag:
      type: object
      required:
        - tag_type
      properties:
        tag_type:
          type: string
      additionalProperties: true
    StoryNewsItem:
      type: object
      additionalProperties: true
      required:
        - title
        - content
        - language
      properties:
        title:
          type: string
        content:
          type: string
        review:
          type: string
          nullable: true
        language:
          type: string
    StoryClusterItem:
      type: object
      additionalProperties: true
      required:
        - id
        - tags
        - news_items
      properties:
        id:
          type: string
          minLength: 1
        tags:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/StoryTag"
        news_items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/StoryNewsItem"
    ClusterRequest:
      type: object
      additionalProperties: false
      required:
        - stories
      properties:
        stories:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/StoryClusterItem"
    ClusterIds:
      type: object
      additionalProperties: false
      required:
        - event_clusters
      properties:
        event_clusters:
          type: array
          minItems: 1
          items:
            type: array
            items:
              type: string
    ClusterResponse:
      type: object
      additionalProperties: false
      required:
        - cluster_ids
        - message
      properties:
        cluster_ids:
          $ref: "#/components/schemas/ClusterIds"
        message:
          type: string
          minLength: 1
    InfoResponse:
      type: object
      additionalProperties: false
      required:
        - package_name
        - llm_base_url
        - llm_model
        - llm_timeout
        - summary_route_path
        - ner_route_path
      properties:
        package_name:
          type: string
        llm_base_url:
          type: string
        llm_model:
          type: string
        llm_timeout:
          type: integer
        summary_route_path:
          type: string
        ner_route_path:
          type: string
    Error:
      type: object
      additionalProperties: false
      required:
        - error
      properties:
        error:
          type: string

tags:
  - name: Summarization
    description: Summarization operations
  - name: NER
    description: Named entity recognition operations
  - name: Clustering
    description: Story clustering operations
  - name: System
    description: Health and info endpoints
